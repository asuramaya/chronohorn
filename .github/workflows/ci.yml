name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]" --no-deps || true
          pip install pytest numpy
      - name: Run tests
        run: pytest tests/ -x -q --tb=short -k "not workstream"
        # Skips tests requiring open-predictive-coder (not on PyPI).
        # Tests that can run without the training backend must pass.

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check
        run: cargo check --all
      - name: Test
        run: cargo test -p chronohorn-runtime -p chronohorn-schema -p chronohorn-cli -q
        # Tests crates that don't require libopenblas-dev.
        # chronohorn-causal-bank tests are excluded (need system BLAS).
