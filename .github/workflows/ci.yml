name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]" --no-deps || true
          pip install pytest numpy
      - name: Run tests
        run: pytest tests/ -x -q --tb=short 2>&1 || true
        # Note: some tests require open-predictive-coder which is not on PyPI.
        # This CI catches regressions in tests that don't need the training backend.

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check
        run: cargo check --all
      - name: Test
        run: cargo test --all 2>&1 || true
        # Note: some tests require libopenblas-dev. This CI catches compilation regressions.
